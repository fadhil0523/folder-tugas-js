<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Document</title>
    <style>
      /* NAVBAR */
      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 80px;
        z-index: 999;

        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);

        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);

        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px;

        transform: translateY(-100%);
        opacity: 0;
        transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        
      }

      .navbar.active {
        transform: translateY(0%);
        opacity: 1;
      }

      .navbar a {
        text-decoration: none; /* hilangin underline */
        color: #111; /* hitam */
        font-size: 16px;
        font-weight: 500;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;

        transition: 0.3s;
      }
      .navbar a:hover {
        transform: translateY(-3px);
        color: #000;
      }
      
      .overlay {
        position: fixed;
        inset: 0;

        background: rgba(0, 0, 0, 0.35);

        backdrop-filter: blur(4px);

        opacity: 0;
        pointer-events: none;

        transition: opacity 0.3s ease;
      }

      .overlay.active {
        opacity: 1;
        pointer-events: all;
      }
    </style>
  </head>
  <body>
    <div class="navbar" id="navbar">
      <a href="">Home</a>
      <a href="">About</a>
      <a href="">Contact</a>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="nav__button">
      <i class="fa-solid fa-bars humberger__button" id="humbergerButton"></i>
    </div>

    <script>
      const humbergerButton = document.getElementById("humbergerButton");
      const navbar = document.getElementById("navbar");
      const overlay = document.getElementById("overlay");

      humbergerButton.addEventListener("click", () => {
        navbar.classList.toggle("active");
        overlay.classList.toggle("active");
      });

      overlay.addEventListener("click", () => {
        navbar.classList.remove("active");
        overlay.classList.remove("active");
      });
    </script>
  </body>
</html>
